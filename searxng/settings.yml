# SearXNG config — merges over the image defaults.
#
# WHY THIS FILE MATTERS: SearXNG's stock config enables only FOUR real web
# engines (brave, duckduckgo, google, startpage) — the other "enabled" defaults
# are dictionary/currency/translate/wiki helpers, not web search. All four of
# those routinely block a self-hosted instance:
#     duckduckgo -> CAPTCHA          startpage -> CAPTCHA
#     brave      -> 429 rate-limit   google    -> HTML parser IndexError
# When they're all blocked at once you get ZERO results. That is the failure
# most self-hosted SearXNG users hit, and it is a CONFIG problem, not proof
# that SearXNG can't work.
#
# THE FIX: widen the pool with engines that do NOT fight self-hosted clients.
# `mojeek` and `mwmbl` run their own independent crawlers and welcome bots;
# `bing`, `yahoo`, `qwant`, `yep`, `presearch` are far more tolerant than the
# big-four above. With ~10 engines answering, a few being blocked no longer
# empties the result set — that redundancy IS the resilience.
#
# Tor/onion engines are removed outright: they need a Tor proxy we don't run,
# so they only fail to load at startup and can never return anything.
use_default_settings:
  engines:
    remove:
      - ahmia
      - torch

engines:
  # --- Independent indexes: server-friendly, do not block. Highest value. ---
  - name: mojeek
    disabled: false
  - name: mwmbl
    disabled: false

  # --- Major indexes, tolerant of self-hosted clients. ---
  - name: bing
    disabled: false
  - name: yahoo
    disabled: false
  - name: qwant
    disabled: false
  - name: yep
    disabled: false
  - name: presearch
    disabled: false
  # Alternate DuckDuckGo implementation — often works when `duckduckgo` CAPTCHAs.
  - name: duckduckgo web
    disabled: false

  # --- Kept enabled but expected to fail often; they still help when they work.
  # Do NOT rely on these alone (that is the zero-results trap).
  - name: brave
    disabled: false     # 429s under burst, auto-recovers after ~180s
  - name: google
    disabled: false     # intermittent parser IndexError upstream

  # --- Permanently CAPTCHA-walled from a self-hosted IP: pure latency + log
  # noise, never results. Disabled (we now have plenty of engines without them).
  - name: duckduckgo
    disabled: true
  - name: startpage
    disabled: true

server:
  # Overridden at runtime by the SEARXNG_SECRET env var in docker-compose.
  secret_key: "please-change-this-searxng-secret"
  limiter: false          # no per-IP rate limiting for a private/internal box
  image_proxy: false

search:
  # JSON is REQUIRED — the shim calls /search?format=json. Without it SearXNG
  # returns HTML and the shim raises an "enable formats" upstream error.
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""
